version: 2

models:
  - name: stg_region
    description: '{{ doc("stg_region") }}'
    columns:
      - name: region_id
        description: '{{ doc("region_id") }}'
        data_tests:
          - unique
          - not_null
      - name: region_name
        description: '{{ doc("stg_region_region_name") }}'
        data_tests:
          - not_null
      - name: region_comment
        description: '{{ doc("stg_region_region_comment") }}'
      - name: loaded_at
        description: '{{ doc("loaded_at") }}'
        data_tests:
          - not_null
      - name: load_source_name
        description: '{{ doc("load_source_name") }}'
        data_tests:
          - not_null
