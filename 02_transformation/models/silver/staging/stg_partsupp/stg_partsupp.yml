version: 2

models:
  - name: stg_partsupp
    description: '{{ doc("stg_partsupp") }}'
    columns:
      - name: part_id
        description: '{{ doc("part_id") }}'
        data_tests:
          - not_null
      - name: supplier_id
        description: '{{ doc("supplier_id") }}'
        data_tests:
          - not_null
      - name: available_quantity
        description: '{{ doc("stg_partsupp_available_quantity") }}'
      - name: supply_cost_value
        description: '{{ doc("stg_partsupp_supply_cost_value") }}'
      - name: part_supplier_comment
        description: '{{ doc("stg_partsupp_part_supplier_comment") }}'
      - name: loaded_at
        description: '{{ doc("loaded_at") }}'
        data_tests:
          - not_null
      - name: load_source_name
        description: '{{ doc("load_source_name") }}'
        data_tests:
          - not_null
