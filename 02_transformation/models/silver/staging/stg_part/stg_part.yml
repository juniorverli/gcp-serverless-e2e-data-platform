version: 2

models:
  - name: stg_part
    description: '{{ doc("stg_part") }}'
    columns:
      - name: part_id
        description: '{{ doc("part_id") }}'
        data_tests:
          - unique
          - not_null
      - name: part_name
        description: '{{ doc("stg_part_part_name") }}'
        data_tests:
          - not_null
      - name: manufacturer_name
        description: '{{ doc("stg_part_manufacturer_name") }}'
      - name: brand_name
        description: '{{ doc("stg_part_brand_name") }}'
      - name: part_type_name
        description: '{{ doc("stg_part_part_type_name") }}'
      - name: part_size
        description: '{{ doc("stg_part_part_size") }}'
      - name: container_name
        description: '{{ doc("stg_part_container_name") }}'
      - name: retail_price_value
        description: '{{ doc("stg_part_retail_price_value") }}'
      - name: part_comment
        description: '{{ doc("stg_part_part_comment") }}'
      - name: loaded_at
        description: '{{ doc("loaded_at") }}'
        data_tests:
          - not_null
      - name: load_source_name
        description: '{{ doc("load_source_name") }}'
        data_tests:
          - not_null
