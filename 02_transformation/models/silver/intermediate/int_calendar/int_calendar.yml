version: 2

models:
  - name: int_calendar
    description: '{{ doc("int_calendar") }}'
    columns:
      - name: created_date
        description: '{{ doc("int_calendar_created_date") }}'
        data_tests:
          - unique
          - not_null
      - name: year
        description: '{{ doc("int_calendar_year") }}'
        data_tests:
          - not_null
      - name: quarter
        description: '{{ doc("int_calendar_quarter") }}'
        data_tests:
          - not_null
      - name: month
        description: '{{ doc("int_calendar_month") }}'
        data_tests:
          - not_null
      - name: month_name
        description: '{{ doc("int_calendar_month_name") }}'
        data_tests:
          - not_null
      - name: week_of_year
        description: '{{ doc("int_calendar_week_of_year") }}'
      - name: day_of_month
        description: '{{ doc("int_calendar_day_of_month") }}'
      - name: day_of_week
        description: '{{ doc("int_calendar_day_of_week") }}'
      - name: day_name
        description: '{{ doc("int_calendar_day_name") }}'
      - name: is_weekend
        description: '{{ doc("int_calendar_is_weekend") }}'
        data_tests:
          - not_null
