catalogs:
  - name: silver_iceberg_catalog
    active_write_integration: biglake_metastore
    write_integrations:
      - name: biglake_metastore
        external_volume: "gs://{{ env_var('GCP_PROJECT_ID') }}-silver-dev"
        table_format: iceberg
        file_format: parquet
        catalog_type: biglake_metastore

  - name: gold_iceberg_catalog
    active_write_integration: biglake_metastore
    write_integrations:
      - name: biglake_metastore
        external_volume: "gs://{{ env_var('GCP_PROJECT_ID') }}-gold-dev"
        table_format: iceberg
        file_format: parquet
        catalog_type: biglake_metastore
